<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>数字マッチング 1・3・5</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f8f9fc;
            font-family: 'Arial Black', 'Impact', sans-serif;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            cursor: pointer;
        }

        .start-btn {
            background-color: #ff8c00;
            color: white;
            font-size: 50px;
            padding: 30px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
            text-align: center;
            line-height: 1.3;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .target-container {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 30px;
        }

        .target {
            width: 200px;
            height: 200px;
            background-color: #000000;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-weight: 900;
            color: #ffffff;
            box-shadow:
                inset 15px 15px 25px rgba(0,0,0,0.9),
                inset -5px -5px 12px rgba(255,255,255,0.15);
            position: relative;
            transition: all 0.3s ease;
        }

        .piece {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-weight: 900;
            color: #1e3c72;
            /* 修正ポイント：黒い影を消し、厚みと光沢だけを残して立体感を表現 */
            text-shadow:
                0 1px 0 #152b52,
                0 2px 0 #122445,
                0 3px 0 #0f1e3a,
                0 4px 0 #0c182e,
                0 5px 0 #091223,
                0 6px 0 #060e1a,
                0 -2px 3px rgba(255, 255, 255, 0.5); /* 上部の光沢（ハイライト） */
            cursor: grab;
            touch-action: none;
            position: absolute;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;
        }

        .piece:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .piece.matched {
            transform: scale(1) !important;
        }

        #reset-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 110px;
            height: 110px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }

        #reset-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: rgba(0, 0, 0, 0.35);
            transition: height 0.1s linear;
        }

        #success-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255,255,255,0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            font-weight: bold;
            color: #ff4081;
            text-shadow:
                5px 5px 0px #fff,
                9px 9px 0px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 50;
        }

        #success-screen.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

    <div id="start-screen">
        <div class="start-btn">タップして<br>スタート</div>
    </div>

    <div class="target-container">
        <div class="target" id="target-1" data-num="1">1</div>
        <div class="target" id="target-3" data-num="3">3</div>
        <div class="target" id="target-5" data-num="5">5</div>
    </div>

    <button id="reset-btn">
        <div id="reset-progress"></div>
        <span style="position:relative; z-index:2;">長押し<br>1秒</span>
    </button>

    <div id="success-screen">おめでとう！</div>

    <script>
        // ==========================================
        // 基本設定
        // ==========================================
        const numbers = [1, 3, 5];
        const successScreen = document.getElementById('success-screen');
        let matchedCount = 0;

        // ==========================================
        // 用意した音声ファイルだけを使う
        // ==========================================
        const audioFiles = {
            1: 'https://icoaplus.github.io/number-matching-1-3-5/num001_02_01.wav',
            3: 'https://icoaplus.github.io/number-matching-1-3-5/num003_02_01.wav',
            5: 'https://icoaplus.github.io/number-matching-1-3-5/num005_02_01.wav'
        };

        // 音声を事前に読み込むための入れ物
        const preloadedAudios = {};

        // ==========================================
        // スタート画面
        // ==========================================
        document.getElementById('start-screen').addEventListener('pointerdown', () => {
            preloadVoiceFiles();

            document.getElementById('start-screen').style.display = 'none';
            initGame();
        });

        // ==========================================
        // 音声ファイルを事前読み込み
        // ==========================================
        function preloadVoiceFiles() {
            numbers.forEach(num => {
                const audio = new Audio(audioFiles[num]);
                audio.preload = 'auto';
                audio.load();
                preloadedAudios[num] = audio;
            });
        }

        // 数字の音声を再生
        // ==========================================

                console.error('音声ファイルが見つかりません:', num);
                return;
            }

            audio.volume = 1.0;
