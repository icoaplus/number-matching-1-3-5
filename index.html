<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>数字マッチング 1・3・5</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f8f9fc;
            font-family: 'Arial Black', 'Impact', sans-serif;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            cursor: pointer;
        }

        .start-btn {
            background-color: #ff8c00;
            color: white;
            font-size: 50px;
            padding: 30px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: pulse 1.5s infinite;
            text-align: center;
            line-height: 1.3;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .target-container {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 30px;
        }

        .target {
            width: 200px;
            height: 200px;
            background-color: #000000;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-weight: 900;
            color: #ffffff;
            box-shadow:
                inset 15px 15px 25px rgba(0,0,0,0.9),
                inset -5px -5px 12px rgba(255,255,255,0.15);
            position: relative;
            transition: all 0.3s ease;
        }

        .piece {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-weight: 900;
            cursor: grab;
            touch-action: none;
            position: absolute;
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;

            /* 強めの立体感。影は使わない */
            color: transparent;
            background:
                linear-gradient(
                    to bottom,
                    #ffffff 0%,
                    #eef8ff 8%,
                    #cfe8ff 18%,
                    #9fd0ff 32%,
                    #6dadf2 48%,
                    #4d8ddd 62%,
                    #2f6fbe 78%,
                    #1b4a8f 100%
                );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-stroke: 4px #1d4c8f;
        }

        .piece::after {
            content: attr(data-num);
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-weight: 900;
            color: transparent;
            background:
                linear-gradient(
                    to bottom,
                    rgba(255,255,255,1) 0%,
                    rgba(255,255,255,0.8) 12%,
                    rgba(255,255,255,0.25) 26%,
                    rgba(255,255,255,0) 42%
                );
            -webkit-background-clip: text;
            background-clip: text;
            pointer-events: none;
        }

        .piece:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .piece.matched {
            transform: scale(1) !important;
        }

        .piece.matched::after {
            content: attr(data-num);
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 140px;
            font-weight: 900;
            color: transparent;
            background:
                linear-gradient(
                    to bottom,
                    rgba(255,255,255,1) 0%,
                    rgba(255,255,255,0.8) 12%,
                    rgba(255,255,255,0.25) 26%,
                    rgba(255,255,255,0) 42%
                );
            -webkit-background-clip: text;
            background-clip: text;
            pointer-events: none;
        }

        #reset-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 110px;
            height: 110px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }

        #reset-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: rgba(0, 0, 0, 0.35);
            transition: height 0.1s linear;
        }

        #success-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255,255,255,0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            font-weight: bold;
            color: #ff4081;
            text-shadow:
                5px 5px 0px #fff,
                9px 9px 0px rgba(0,0,0,0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            z-index: 50;
        }

        #success-screen.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

    <div id="start-screen">
        <div class="start-btn">タップして<br>スタート</div>
    </div>

    <div class="target-container">
        <div class="target" id="target-1" data-num="1">1</div>
        <div class="target" id="target-3" data-num="3">3</div>
        <div class="target" id="target-5" data-num="5">5</div>
    </div>

    <button id="reset-btn">
        <div id="reset-progress"></div>
        <span style="position:relative; z-index:2;">長押し<br>1秒</span>
    </button>

    <div id="success-screen">おめでとう！</div>

    <script>
        // ==========================================
        // 基本設定
        // ==========================================
        const numbers = [1, 3, 5];
        const successScreen = document.getElementById('success-screen');
        let matchedCount = 0;

        // ==========================================
        // 用意した音声ファイルだけを使う
        // ==========================================
        const audioFiles = {
            1: 'https://icoaplus.github.io/number-matching-1-3-5/num001_02_01.wav',
            3: 'https://icoaplus.github.io/number-matching-1-3-5/num003_02_01.wav',
            5: 'https://icoaplus.github.io/number-matching-1-3-5/num005_02_01.wav'
        };

        // ==========================================
        // スタート画面
        // PCクリック・タッチ両方に対応
        // ==========================================
        const startScreen = document.getElementById('start-screen');
        let hasStarted = false;

        function startGame() {
            if (hasStarted) return;
            hasStarted = true;

            preloadVoiceFiles();

            startScreen.style.display = 'none';
            initGame();
        }

        startScreen.addEventListener('click', startGame);

        startScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });

        // ==========================================
        // 音声ファイルを事前読み込み
        // ==========================================
        function preloadVoiceFiles() {
            numbers.forEach(num => {
                const audio = new Audio(audioFiles[num]);
                audio.preload = 'auto';
                audio.load();
            });
        }

        // ==========================================
        // 数字の音声を再生
        // ==========================================
        function speakNumber(num) {
            const file = audioFiles[num];

            if (!file) {
                console.error('音声ファイルが見つかりません:', num);
                return;
            }

            const audio = new Audio(file);
            audio.preload = 'auto';
            audio.volume = 1.0;
            audio.currentTime = 0;

            audio.play()
                .then(() => {
                    console.log('用意した音声を再生しました:', file);
                })
                .catch(error => {
                    console.error('音声再生エラー:', file, error);
                });
        }

        // ==========================================
        // ゲーム初期化
        // ==========================================
        function initGame() {
            document.querySelectorAll('.piece').forEach(piece => piece.remove());

            matchedCount = 0;
            successScreen.classList.remove('show');

            numbers.forEach(num => {
                const target = document.getElementById(`target-${num}`);
                target.style.color = '#ffffff';
                target.style.boxShadow =
                    'inset 15px 15px 25px rgba(0,0,0,0.9), inset -5px -5px 12px rgba(255,255,255,0.15)';
            });

            const shuffled = [...numbers].sort(() => Math.random() - 0.5);
            const step = window.innerWidth / 3;
            const pieceSize = 200;

            shuffled.forEach((num, index) => {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.innerText = num;
                piece.dataset.num = num;

                const initialX = (step * index) + (step - pieceSize) / 2;
                const initialY = window.innerHeight - pieceSize - 80;

                piece.style.left = `${initialX}px`;
                piece.style.top = `${initialY}px`;

                setupDrag(piece, initialX, initialY);
                document.body.appendChild(piece);
            });
        }

        // ==========================================
        // ドラッグ操作
        // ==========================================
        function setupDrag(piece, initX, initY) {
            let currentX = initX;
            let currentY = initY;
            let startX = 0;
            let startY = 0;
            let isDragging = false;

            function movePiece(x, y) {
                currentX = x - startX;
                currentY = y - startY;

                piece.style.left = `${currentX}px`;
                piece.style.top = `${currentY}px`;
            }

            // タッチ操作
            piece.addEventListener('touchstart', (e) => {
                e.preventDefault();

                const touch = e.touches[0];
                startX = touch.clientX - currentX;
                startY = touch.clientY - currentY;

                piece.style.zIndex = 1000;
            }, { passive: false });

            piece.addEventListener('touchmove', (e) => {
                e.preventDefault();

                const touch = e.touches[0];
                movePiece(touch.clientX, touch.clientY);
            }, { passive: false });

            piece.addEventListener('touchend', () => {
                piece.style.zIndex = 10;
                checkMatch(piece, initX, initY);
            });

            // PCマウス操作
            piece.addEventListener('mousedown', (e) => {
                isDragging = true;

                startX = e.clientX - currentX;
                startY = e.clientY - currentY;

                piece.style.zIndex = 1000;
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                movePiece(e.clientX, e.clientY);
            });

            window.addEventListener('mouseup', () => {
                if (!isDragging) return;

                isDragging = false;
                piece.style.zIndex = 10;

                checkMatch(piece, initX, initY);
            });
        }

        // ==========================================
        // 正解判定
        // ==========================================
        function checkMatch(piece, initX, initY) {
            const num = Number(piece.dataset.num);
            const target = document.getElementById(`target-${num}`);

            const pRect = piece.getBoundingClientRect();
            const tRect = target.getBoundingClientRect();

            const pCenterX = pRect.left + pRect.width / 2;
            const pCenterY = pRect.top + pRect.height / 2;
            const tCenterX = tRect.left + tRect.width / 2;
            const tCenterY = tRect.top + tRect.height / 2;

            const distance = Math.sqrt(
                Math.pow(pCenterX - tCenterX, 2) +
                Math.pow(pCenterY - tCenterY, 2)
            );

            if (distance < 100) {
                piece.style.left = `${tRect.left}px`;
                piece.style.top = `${tRect.top}px`;
                piece.style.pointerEvents = 'none';
                piece.classList.add('matched');

                target.style.color = 'transparent';
                target.style.boxShadow =
                    'inset 15px 15px 25px rgba(0,0,0,0.9), 0 0 20px rgba(255, 215, 0, 0.4)';

                speakNumber(num);

                matchedCount++;

                if (matchedCount === numbers.length) {
                    setTimeout(showSuccess, 1000);
                }

            } else {
                piece.style.transition = 'left 0.25s ease, top 0.25s ease';
                piece.style.left = `${initX}px`;
                piece.style.top = `${initY}px`;

                setTimeout(() => {
                    piece.style.transition = 'transform 0.1s ease';
                }, 250);
            }
        }

        // ==========================================
        // クリア画面
        // ==========================================
        function showSuccess() {
            successScreen.classList.add('show');

            const duration = 4.0 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 65,
                    origin: { x: 0, y: 0.8 }
                });

                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 65,
                    origin: { x: 1, y: 0.8 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // ==========================================
        // リセットボタン 長押し
        // ==========================================
        const resetBtn = document.getElementById('reset-btn');
        const resetProgress = document.getElementById('reset-progress');

        let resetTimer;
        let progressInterval;
        let progressHeight = 0;

        function startReset() {
            progressHeight = 0;
            resetProgress.style.height = '0%';

            resetTimer = setTimeout(() => {
                initGame();
                endReset();
            }, 1000);

            progressInterval = setInterval(() => {
                progressHeight += 10;

                if (progressHeight <= 100) {
                    resetProgress.style.height = `${progressHeight}%`;
                }
            }, 100);
        }

        function endReset() {
            clearTimeout(resetTimer);
            clearInterval(progressInterval);
            resetProgress.style.height = '0%';
        }

        resetBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startReset();
        }, { passive: false });

        resetBtn.addEventListener('touchend', endReset);
        resetBtn.addEventListener('touchcancel', endReset);

        resetBtn.addEventListener('mousedown', startReset);
        resetBtn.addEventListener('mouseup', endReset);
        resetBtn.addEventListener('mouseleave', endReset);

        window.addEventListener('resize', () => {
            if (startScreen.style.display === 'none') {
                initGame();
            }
        });
    </script>
</body>
</html>
